<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign up form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <div class="image-side">
            <div class="logo-container">
                <div class="img-odin">
                    <img src="odin-lined.png" alt="Odin Logo">
                </div>
               <div> <p>ODIN</p></div>
            </div>
        </div>
        <div class="content-side">
            <p>
                This is not a real online service! You know you need something like this in your life 
                to help you realise your deepest dreams. <br>Sign up to get started. <br>
                You know you want to.
            </p>
            <form action="" method="post">
                <p>Let's do this!</p>
                <div class="main-input">
                    <div class="names">
                        <div>
                            <label for="fname">First Name</label>
                            <input type="text" id="fname" name="fname" required>
                        </div>
                        <div>
                            <label for="lname">Last Name</label>
                            <input type="text" id="lname" name="lname" required>
                        </div>
                    </div>
                    <div class="contacts">
                        <div>
                            <label for="email">Email</label>
                            <input type="email" id="email" name="email" required>
                        </div>
                        <div>
                            <label for="telenumber">Phone Number</label>
                            <input type="tel" id="telenumber" name="telenumber" required>
                        </div>
                    </div>
                    <div class="passwords">
                        <div>
                            <label for="password">Password</label>
                            <input type="password" id="password" name="password" required>
                        </div>
                        <div>
                            <label for="confirm-password">Confirm Password</label>
                            <input type="password" id="confirm-password" name="confirm-password" required>
                        </div>
                    </div>
                </div>
                <div class="login-links">
                    <button><a href="#">Create Account</a></button>
                    <p>Already have an account? <a href="#">Log in</a></p>
                </div>
            </form>
        </div>
    </main>
</body>
</html>
